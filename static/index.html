<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e8e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1rem; font-weight: 600; }
    header span { font-size: 0.75rem; color: #666; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #1e1e2e;
    }
    .tab {
      padding: 10px 20px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }

    .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .panel.active { display: flex; }

    /* ── Chat ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.user { align-self: flex-end; background: #4f46e5; color: #fff; border-bottom-right-radius: 3px; }
    .msg.agent { align-self: flex-start; background: #1e1e2e; border-bottom-left-radius: 3px; }
    .msg.thinking { color: #666; font-style: italic; }

    #chat-form {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid #1e1e2e;
    }
    #chat-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8f0;
      font-size: 0.9rem;
      resize: none;
      outline: none;
    }
    #chat-input:focus { border-color: #4f46e5; }
    #send-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { background: #2e2e3e; cursor: default; }

    /* ── Notes ── */
    #notes-panel {
      flex-direction: column;
    }
    #notes-toolbar {
      padding: 14px 20px;
      display: flex;
      justify-content: flex-end;
    }
    #refresh-btn {
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      color: #e8e8f0;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: #2e2e3e; }
    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .note-card {
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .note-card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
    .note-card p { font-size: 0.85rem; color: #aaa; line-height: 1.5; }
    .note-card time { font-size: 0.75rem; color: #555; display: block; margin-top: 8px; }
    #notes-empty { color: #555; font-size: 0.9rem; text-align: center; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>Notes Agent</h1>
    <span>powered by LangGraph + Neon</span>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="chat">Chat</div>
    <div class="tab" data-tab="notes">All Notes</div>
  </div>

  <div class="panel active" id="chat-panel">
    <div id="messages"></div>
    <form id="chat-form">
      <textarea id="chat-input" rows="1" placeholder='Try: "Save a note: FastAPI is fast" or "List my notes"'></textarea>
      <button id="send-btn" type="submit">Send</button>
    </form>
  </div>

  <div class="panel" id="notes-panel">
    <div id="notes-toolbar">
      <button id="refresh-btn">Refresh</button>
    </div>
    <div id="notes-list"></div>
  </div>

  <script>
    // tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
        if (tab.dataset.tab === 'notes') loadNotes();
      });
    });

    // chat
    const messages = document.getElementById('messages');
    const input = document.getElementById('chat-input');
    const form = document.getElementById('chat-form');
    const sendBtn = document.getElementById('send-btn');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user');
      const thinking = addMsg('Thinking…', 'agent thinking');
      sendBtn.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        thinking.className = 'msg agent';
        thinking.textContent = data.reply ?? data.detail ?? 'Error';
      } catch {
        thinking.className = 'msg agent';
        thinking.textContent = 'Request failed.';
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    // notes
    async function loadNotes() {
      const list = document.getElementById('notes-list');
      list.innerHTML = '<p id="notes-empty">Loading…</p>';
      try {
        const res = await fetch('/notes');
        const notes = await res.json();
        if (!notes.length) {
          list.innerHTML = '<p id="notes-empty">No notes yet.</p>';
          return;
        }
        list.innerHTML = '';
        notes.forEach(n => {
          const card = document.createElement('div');
          card.className = 'note-card';
          const date = new Date(n.created_at).toLocaleString();
          card.innerHTML = `<h3>${esc(n.title)}</h3><p>${esc(n.content)}</p><time>${date}</time>`;
          list.appendChild(card);
        });
      } catch {
        list.innerHTML = '<p id="notes-empty">Failed to load notes.</p>';
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadNotes);

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
